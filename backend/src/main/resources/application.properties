spring.application.name=gestion-rh-backend
server.port=${SPRING_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/gestion_rh?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info

# Error handling
server.error.include-message=always
server.error.include-stacktrace=never
server.error.include-exception=false

# Logging
logging.level.root=INFO
logging.level.com.gestionrh=DEBUG
